<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #f8f5ee;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .box {
      max-width: 600px;
      width: 100%;
      background: white;
      border: 3px solid #c89f2d;
      border-radius: 18px;
      padding: 36px 28px;
      text-align: center;
      box-shadow: 0 12px 28px rgba(0,0,0,0.08);
    }

    h1 {
      color: #244778;
      margin-top: 0;
      font-size: 30px;
    }

    p {
      font-size: 20px;
      color: #6f5c4a;
      line-height: 1.6;
    }

    a {
      display: inline-block;
      margin-top: 18px;
      text-decoration: none;
      background: #244778;
      color: white;
      padding: 14px 24px;
      border-radius: 12px;
      border: 2px solid #c89f2d;
      font-family: Arial, sans-serif;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Thank You, {{ name }}!</h1>
    <p>Your RSVP has been received as: <strong>{{ attendance }}</strong></p>
    <p>We appreciate your response.</p>
    <a href="/">Back to Invitation</a>
  </div>
</body>
</html>
